name: Split LeetCode Solutions

on:
  push:
    branches: [ "main" ]

jobs:
  split-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      # Push Java files to DSA repo
      - name: Push Java solutions to DSA repo
        run: |
          git clone https://github.com/SATISHTEJA/leetcode.git dsa
          rsync -av --include="*/" --include="*.java" --exclude="*" ./ dsa/
          cd dsa
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update Java solutions" || echo "No changes"
          git push

      # Push SQL files to SQL repo
      - name: Push SQL solutions to SQL repo
        run: |
          git clone https://github.com/SATISHTEJA/Database.git sql
          rsync -av --include="*/" --include="*.sql" --exclude="*" ./ sql/
          cd sql
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update SQL solutions" || echo "No changes"
          git push
